name: blys-dev

services:
  app-builder:
    image: blyss-app-builder
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        PYTHON_VERSION: "3.12"
    working_dir: /app
    command: >
      /bin/bash -c "set -e &&
      if [ ! -f /opt/venv/bin/activate ]; then uv venv /opt/venv; fi &&
      . /opt/venv/bin/activate &&
      uv pip install -r pyproject.toml &&
      touch /tmp/deps-ready &&
      tail -f /dev/null"
    volumes:
      - pythonpackages:/opt/venv
      - ..:/app
    healthcheck:
      test:
        [
          "CMD",
          "test",
          "-f",
          "/tmp/deps-ready",
          "-a",
          "-f",
          "/opt/venv/bin/uvicorn",
        ]
      interval: 2s
      timeout: 5s
      retries: 60
      start_period: 90s

  app-dev:
    image: blyss-app-dev:latest
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        PYTHON_VERSION: "3.12"
    working_dir: /app
    command: >
      /bin/bash -c "/opt/venv/bin/uvicorn main:app --host 0.0.0.0 --port 8000 --reload"
    environment:
      - PATH=/opt/venv/bin:$PATH
    volumes:
      - pythonpackages:/opt/venv
      - ..:/app
    ports:
      - "8000:8000"
    stdin_open: true
    tty: true
    restart: on-failure
    depends_on:
      app-builder:
        condition: service_healthy

volumes:
  pythonpackages:
    driver: local
